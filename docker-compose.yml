services:
  jobhunter:
    build:
      context: .
    container_name: jobhunter
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JOBHUNTER_LOG_LEVEL: ${JOBHUNTER_LOG_LEVEL:-INFO}
      JOBHUNTER_DAILY_BUDGET_USD: ${JOBHUNTER_DAILY_BUDGET_USD:-0.50}
      JOBHUNTER_MONTHLY_BUDGET_USD: ${JOBHUNTER_MONTHLY_BUDGET_USD:-10.00}
      JOBHUNTER_DATA_DIR: /jobhunter/data
      JOBHUNTER_INPUT_DIR: /jobhunter/input
      JOBHUNTER_CONFIG_DIR: /jobhunter/config
      JOBHUNTER_WORKSPACE_DIR: /jobhunter/workspace
      JOBHUNTER_DATABASE_PATH: /jobhunter/data/jobs.sqlite
      JOBHUNTER_HEARTBEAT_PATH: /jobhunter/data/heartbeat
      JOBHUNTER_TASKS_PATH: /jobhunter/repo/tasks.md
      JOBHUNTER_PROFILE_PATH: /jobhunter/input/profile.local.md
      JOBHUNTER_CV_PATH: /jobhunter/input/cv.local.md
      JOBHUNTER_PROFILE_SETTINGS_PATH: /jobhunter/config/profile.local.json
      JOBHUNTER_SOURCES_PATH: /jobhunter/config/sources.json
      JOBHUNTER_SCORING_PATH: /jobhunter/config/scoring.json
      JOBHUNTER_SETTINGS_PATH: /jobhunter/config/jobhunter.json
      JOBHUNTER_CODEX_HANDOFF_MODE: ${JOBHUNTER_CODEX_HANDOFF_MODE:-auto}
      JOBHUNTER_ROBOTS_TXT_RESPECT: ${JOBHUNTER_ROBOTS_TXT_RESPECT:-trust}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_FOLDER: ${EMAIL_IMAP_FOLDER:-job-alerts}
    volumes:
      - ./data:/jobhunter/data
      - ./config:/jobhunter/config
      - ./input:/jobhunter/input
      - ./openclaw/workspace:/jobhunter/workspace
      - ./:/jobhunter/repo:ro
    command: ["python", "-m", "jobhunter", "serve"]
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  openclaw-gateway:
    build:
      context: ./openclaw/worker
    container_name: jobhunter-openclaw-gateway
    restart: unless-stopped
    profiles:
      - openclaw
    environment:
      CODEX_HOME: /openclaw/codex-home
      HOME: /openclaw/codex-home
      OPENCLAW_WORKSPACE_DIR: /openclaw/workspace
      OPENCLAW_PROMPTS_DIR: /openclaw/prompts
      OPENCLAW_CODEX_MODEL: ${OPENCLAW_CODEX_MODEL:-}
      OPENCLAW_POLL_SECONDS: ${OPENCLAW_POLL_SECONDS:-5}
      OPENCLAW_CODEX_TIMEOUT_SECONDS: ${OPENCLAW_CODEX_TIMEOUT_SECONDS:-900}
      OPENCLAW_AGENT_MAX_CODEX_TURNS: ${OPENCLAW_AGENT_MAX_CODEX_TURNS:-5}
      OPENCLAW_AGENT_MAX_SQL_QUERIES: ${OPENCLAW_AGENT_MAX_SQL_QUERIES:-20}
      OPENCLAW_AGENT_MAX_FILE_READS: ${OPENCLAW_AGENT_MAX_FILE_READS:-10}
      OPENCLAW_AGENT_MAX_HTTP_FETCHES: ${OPENCLAW_AGENT_MAX_HTTP_FETCHES:-5}
      OPENCLAW_MAX_PROMPT_CHARS: ${OPENCLAW_MAX_PROMPT_CHARS:-60000}
      OPENCLAW_JOBHUNTER_DB_PATH: /jobhunter/data/jobs.sqlite
    volumes:
      - ./openclaw/codex-home:/openclaw/codex-home
      - ./openclaw/prompts:/openclaw/prompts:ro
      - ./openclaw/workspace:/openclaw/workspace
      - ./:/jobhunter/repo:ro
      - ./config:/jobhunter/config:ro
      - ./input:/jobhunter/input:ro
      - ./data:/jobhunter/data:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 768m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
