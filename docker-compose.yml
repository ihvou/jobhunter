services:
  jobhunter:
    build:
      context: .
    container_name: jobhunter
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JOBHUNTER_LOG_LEVEL: ${JOBHUNTER_LOG_LEVEL:-INFO}
      JOBHUNTER_DAILY_BUDGET_USD: ${JOBHUNTER_DAILY_BUDGET_USD:-0.50}
      JOBHUNTER_MONTHLY_BUDGET_USD: ${JOBHUNTER_MONTHLY_BUDGET_USD:-10.00}
      JOBHUNTER_DATA_DIR: /jobhunter/data
      JOBHUNTER_INPUT_DIR: /jobhunter/input
      JOBHUNTER_CONFIG_DIR: /jobhunter/config
      JOBHUNTER_WORKSPACE_DIR: /jobhunter/workspace
      JOBHUNTER_DATABASE_PATH: /jobhunter/data/jobs.sqlite
      JOBHUNTER_HEARTBEAT_PATH: /jobhunter/data/heartbeat
      JOBHUNTER_TASKS_PATH: /jobhunter/repo/tasks.md
      JOBHUNTER_PROFILE_PATH: /jobhunter/input/profile.local.md
      JOBHUNTER_CV_PATH: /jobhunter/input/cv.local.md
      JOBHUNTER_PROFILE_SETTINGS_PATH: /jobhunter/config/profile.local.json
      JOBHUNTER_SOURCES_PATH: /jobhunter/config/sources.local.json
      JOBHUNTER_SCORING_PATH: /jobhunter/config/scoring.local.json
      JOBHUNTER_SETTINGS_PATH: /jobhunter/config/jobhunter.json
      JOBHUNTER_CODEX_HANDOFF_MODE: ${JOBHUNTER_CODEX_HANDOFF_MODE:-auto}
      JOBHUNTER_ROBOTS_TXT_RESPECT: ${JOBHUNTER_ROBOTS_TXT_RESPECT:-trust}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_FOLDER: ${EMAIL_IMAP_FOLDER:-job-alerts}
    volumes:
      - ./data:/jobhunter/data
      - ./config:/jobhunter/config
      - ./input:/jobhunter/input
      - ./openclaw/workspace:/jobhunter/workspace
      - ./:/jobhunter/repo:ro
    command: ["python", "-m", "jobhunter", "serve"]
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  jobhunter-service:
    build:
      context: .
    container_name: jobhunter-service
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JOBHUNTER_LOG_LEVEL: ${JOBHUNTER_LOG_LEVEL:-INFO}
      JOBHUNTER_DAILY_BUDGET_USD: ${JOBHUNTER_DAILY_BUDGET_USD:-0.50}
      JOBHUNTER_MONTHLY_BUDGET_USD: ${JOBHUNTER_MONTHLY_BUDGET_USD:-10.00}
      JOBHUNTER_DATA_DIR: /jobhunter/data
      JOBHUNTER_INPUT_DIR: /jobhunter/input
      JOBHUNTER_CONFIG_DIR: /jobhunter/config
      JOBHUNTER_WORKSPACE_DIR: /jobhunter/workspace
      JOBHUNTER_DATABASE_PATH: /jobhunter/data/jobs.sqlite
      JOBHUNTER_HEARTBEAT_PATH: /jobhunter/data/heartbeat
      JOBHUNTER_TASKS_PATH: /jobhunter/repo/tasks.md
      JOBHUNTER_PROFILE_PATH: /jobhunter/input/profile.local.md
      JOBHUNTER_CV_PATH: /jobhunter/input/cv.local.md
      JOBHUNTER_PROFILE_SETTINGS_PATH: /jobhunter/config/profile.local.json
      JOBHUNTER_SOURCES_PATH: /jobhunter/config/sources.local.json
      JOBHUNTER_SCORING_PATH: /jobhunter/config/scoring.local.json
      JOBHUNTER_SETTINGS_PATH: /jobhunter/config/jobhunter.json
      JOBHUNTER_CODEX_HANDOFF_MODE: ${JOBHUNTER_CODEX_HANDOFF_MODE:-auto}
      JOBHUNTER_ROBOTS_TXT_RESPECT: ${JOBHUNTER_ROBOTS_TXT_RESPECT:-ignore}
      JOBHUNTER_SERVICE_HOST: 0.0.0.0
      JOBHUNTER_SERVICE_PORT: 8765
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_FOLDER: ${EMAIL_IMAP_FOLDER:-job-alerts}
    volumes:
      - ./data:/jobhunter/data
      - ./config:/jobhunter/config
      - ./input:/jobhunter/input
      - ./openclaw/workspace:/jobhunter/workspace
      - ./:/jobhunter/repo:ro
    command: ["python", "-m", "jobhunter", "service"]
    ports:
      - "127.0.0.1:8765:8765"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/openclaw-gateway/Dockerfile
      args:
        OPENCLAW_BASE_IMAGE: ghcr.io/openclaw/openclaw:2026.5.7-slim
    image: jobhunter-openclaw-gateway:2026.5.7-slim-python
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      jobhunter-service:
        condition: service_healthy
    environment:
      OPENCLAW_DISABLE_BONJOUR: "1"
      JOBHUNTER_SERVICE_URL: http://jobhunter-service:8765
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
    volumes:
      - openclaw_home:/home/node
      - ${HOME}/.codex:/home/node/.codex:ro
      - ./skills:/openclaw/skills:ro
      - ./:/opt/jobhunter:ro
    ports:
      - "127.0.0.1:18789:18789"
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 2g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:18789/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 5

volumes:
  openclaw_home:
    driver: local
