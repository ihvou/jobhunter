services:
  jobbot:
    build:
      context: .
    container_name: jobhunter-jobbot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JOBBOT_LOG_LEVEL: ${JOBBOT_LOG_LEVEL:-INFO}
      JOBBOT_DAILY_BUDGET_USD: ${JOBBOT_DAILY_BUDGET_USD:-0.50}
      JOBBOT_MONTHLY_BUDGET_USD: ${JOBBOT_MONTHLY_BUDGET_USD:-10.00}
      JOBBOT_DATA_DIR: /jobbot/data
      JOBBOT_INPUT_DIR: /jobbot/input
      JOBBOT_CONFIG_DIR: /jobbot/config
      JOBBOT_WORKSPACE_DIR: /jobbot/workspace
      JOBBOT_DATABASE_PATH: /jobbot/data/jobs.sqlite
      JOBBOT_HEARTBEAT_PATH: /jobbot/data/heartbeat
      JOBBOT_PROFILE_PATH: /jobbot/input/profile.local.md
      JOBBOT_CV_PATH: /jobbot/input/cv.local.md
      JOBBOT_PROFILE_SETTINGS_PATH: /jobbot/config/profile.local.json
      JOBBOT_SOURCES_PATH: /jobbot/config/sources.json
      JOBBOT_SCORING_PATH: /jobbot/config/scoring.json
      JOBBOT_SETTINGS_PATH: /jobbot/config/jobbot.json
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_FOLDER: ${EMAIL_IMAP_FOLDER:-job-alerts}
    volumes:
      - ./data:/jobbot/data
      - ./config:/jobbot/config
      - ./input:/jobbot/input:ro
      - ./openclaw/workspace:/jobbot/workspace
    command: ["python", "-m", "jobbot", "serve"]
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: jobhunter-openclaw-gateway
    restart: unless-stopped
    profiles:
      - openclaw
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/config:/openclaw/config
      - ./openclaw/workspace:/openclaw/workspace
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 768m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
